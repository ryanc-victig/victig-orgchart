<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VICTIG Org Chart - Employee Order Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    padding: 20px;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }
  h1 {
    font-size: 24px;
    margin-bottom: 8px;
    color: #1a1a2e;
  }
  .subtitle {
    color: #64748b;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary {
    background: #4A90E2;
    color: white;
  }
  .btn-primary:hover {
    background: #357ABD;
  }
  .btn-secondary {
    background: #f1f5f9;
    color: #1a1a2e;
    border: 1px solid #e2e8f0;
  }
  .btn-secondary:hover {
    background: #e2e8f0;
  }
  input[type="file"] {
    display: none;
  }
  .employee-list {
    list-style: none;
  }
  .employee-item {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: move;
    transition: all .2s;
  }
  .employee-item:hover {
    border-color: #4A90E2;
    box-shadow: 0 2px 8px rgba(74, 144, 226, .1);
  }
  .employee-item.dragging {
    opacity: 0.5;
    background: #f8fafc;
  }
  .drag-handle {
    color: #94a3b8;
    font-size: 18px;
    line-height: 1;
  }
  .employee-number {
    min-width: 40px;
    color: #64748b;
    font-size: 13px;
    font-weight: 600;
  }
  .employee-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #4A90E2;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
  }
  .employee-info {
    flex: 1;
  }
  .employee-name {
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 2px;
  }
  .employee-title {
    font-size: 13px;
    color: #64748b;
  }
  .employee-dept {
    font-size: 12px;
    color: #94a3b8;
    background: #f8fafc;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .status {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .status.success {
    background: #d1fae5;
    color: #065f46;
    border: 1px solid #6ee7b7;
  }
  .status.info {
    background: #dbeafe;
    color: #1e40af;
    border: 1px solid #93c5fd;
  }
  .search-box {
    width: 300px;
    padding: 10px 16px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .search-box:focus {
    border-color: #4A90E2;
  }
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    padding: 16px;
    background: #f8fafc;
    border-radius: 8px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-label {
    font-size: 12px;
    color: #64748b;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
  }
  .load-section {
    text-align: center;
    padding: 40px;
    border: 2px dashed #e2e8f0;
    border-radius: 12px;
    margin-bottom: 20px;
    background: #f8fafc;
  }
  .load-section h2 {
    margin-bottom: 12px;
    color: #1a1a2e;
  }
  .load-section p {
    color: #64748b;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>👥 Employee Order Editor</h1>
  <p class="subtitle">Drag and drop employees to reorder. Changes are saved to a new JSON file.</p>
  
  <div class="load-section" id="loadSection">
    <h2>📁 Load Employee Data</h2>
    <p>Click below to load data-fixed.json from your computer</p>
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
      Choose JSON File
    </button>
    <input type="file" id="fileInput" accept=".json" onchange="loadFile(event)">
  </div>
  
  <div id="editorSection" style="display: none;">
    <div class="toolbar">
      <button class="btn btn-secondary" onclick="document.getElementById('fileInput2').click()">
        📁 Load Different File
      </button>
      <input type="file" id="fileInput2" accept=".json" onchange="loadFile(event)">
      
      <button class="btn btn-primary" onclick="saveJSON()">
        💾 Download Updated JSON
      </button>
      
      <button class="btn btn-secondary" onclick="copyJSON()">
        📋 Copy JSON
      </button>
      
      <input type="text" class="search-box" id="searchBox" placeholder="Search employees..." onkeyup="filterEmployees()">
    </div>
    
    <div id="status"></div>
    
    <div class="stats" id="stats">
      <div class="stat">
        <div class="stat-label">Total Employees</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Displayed</div>
        <div class="stat-value" id="displayedCount">0</div>
      </div>
    </div>
    
    <ul class="employee-list" id="employeeList"></ul>
  </div>
</div>

<script>
let orgData = null;
let originalData = null;

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      loadData(data);
      showStatus('File loaded successfully! ' + data.employees.length + ' employees found.', 'success');
      document.getElementById('loadSection').style.display = 'none';
      document.getElementById('editorSection').style.display = 'block';
    } catch (err) {
      alert('Error parsing JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function loadData(data) {
  orgData = JSON.parse(JSON.stringify(data));
  originalData = JSON.parse(JSON.stringify(data));
  renderEmployeeList();
  updateStats();
}

function renderEmployeeList() {
  if (!orgData || !orgData.employees) {
    return;
  }
  
  const list = document.getElementById('employeeList');
  list.innerHTML = '';
  
  orgData.employees.forEach((emp, index) => {
    const li = document.createElement('li');
    li.className = 'employee-item';
    li.draggable = true;
    li.dataset.index = index;
    li.dataset.name = emp.name.toLowerCase();
    li.dataset.title = (emp.title || '').toLowerCase();
    li.dataset.dept = (emp.department || '').toLowerCase();
    
    li.innerHTML = `
      <span class="drag-handle">⋮⋮</span>
      <span class="employee-number">#${index + 1}</span>
      <div class="employee-avatar">${emp.initials || '??'}</div>
      <div class="employee-info">
        <div class="employee-name">${emp.name}</div>
        <div class="employee-title">${emp.title || 'No title'}</div>
      </div>
      <span class="employee-dept">${emp.department || 'No dept'}</span>
    `;
    
    li.addEventListener('dragstart', handleDragStart);
    li.addEventListener('dragover', handleDragOver);
    li.addEventListener('drop', handleDrop);
    li.addEventListener('dragend', handleDragEnd);
    
    list.appendChild(li);
  });
}

let draggedElement = null;

function handleDragStart(e) {
  draggedElement = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
  if (e.preventDefault) {
    e.preventDefault();
  }
  e.dataTransfer.dropEffect = 'move';
  return false;
}

function handleDrop(e) {
  if (e.stopPropagation) {
    e.stopPropagation();
  }
  
  if (draggedElement !== this) {
    const draggedIndex = parseInt(draggedElement.dataset.index);
    const targetIndex = parseInt(this.dataset.index);
    
    const [removed] = orgData.employees.splice(draggedIndex, 1);
    orgData.employees.splice(targetIndex, 0, removed);
    
    renderEmployeeList();
    updateStats();
    showStatus('Employee moved. Don\'t forget to download when done!', 'info');
  }
  
  return false;
}

function handleDragEnd(e) {
  this.classList.remove('dragging');
}

function filterEmployees() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const items = document.querySelectorAll('.employee-item');
  let visibleCount = 0;
  
  items.forEach(item => {
    const name = item.dataset.name;
    const title = item.dataset.title;
    const dept = item.dataset.dept;
    
    if (name.includes(search) || title.includes(search) || dept.includes(search)) {
      item.style.display = 'flex';
      visibleCount++;
    } else {
      item.style.display = 'none';
    }
  });
  
  document.getElementById('displayedCount').textContent = visibleCount;
}

function updateStats() {
  const total = orgData.employees.length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('displayedCount').textContent = total;
}

function saveJSON() {
  if (!orgData) {
    alert('No data to save!');
    return;
  }
  
  const dataStr = JSON.stringify(orgData, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'data-fixed.json';
  a.click();
  URL.revokeObjectURL(url);
  
  showStatus('✅ data-fixed.json downloaded! Replace the original file with this one.', 'success');
}

function copyJSON() {
  if (!orgData) {
    alert('No data to copy!');
    return;
  }
  
  const dataStr = JSON.stringify(orgData, null, 2);
  navigator.clipboard.writeText(dataStr).then(() => {
    showStatus('JSON copied to clipboard!', 'success');
  }).catch(err => {
    showStatus('Failed to copy: ' + err.message, 'error');
  });
}

function showStatus(message, type) {
  const statusDiv = document.getElementById('status');
  statusDiv.className = 'status ' + type;
  statusDiv.textContent = message;
  statusDiv.style.display = 'block';
  
  if (type === 'success') {
    setTimeout(() => {
      statusDiv.style.display = 'none';
    }, 3000);
  }
}
</script>

</body>
</html>
