<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VICTIG Org Chart</title>
<style>
:root {
  --bg: #f0f2f5;
  --card-bg: #fff;
  --text: #1a1a2e;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.1);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.12);
  --radius: 10px;
  --exec: #4A90E2;
  --strategic: #8B5CF6; /* Purple for Strategic Leadership */
  --ownership-gold: #F59E0B;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ---- Header / Toolbar ---- */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.toolbar h1 { font-size: 20px; font-weight: 700; color: var(--text); white-space: nowrap; }
.toolbar h1 span { color: var(--exec); }

/* ---- Tab Buttons ---- */
.tab-buttons {
  display: flex;
  gap: 4px;
  background: var(--bg);
  padding: 4px;
  border-radius: 8px;
  margin-right: auto;
  margin-left: 16px;
}
.tab-btn {
  padding: 8px 20px;
  border: none;
  background: transparent;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  color: var(--text-secondary);
}
.tab-btn:hover {
  background: #e2e8f0;
  color: var(--text);
}
.tab-btn.active {
  background: var(--exec);
  color: #fff;
}
.toolbar input[type="text"] {
  padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 14px; width: 240px; outline: none; transition: border .2s;
}
.toolbar input[type="text"]:focus { border-color: var(--exec); }
.btn {
  padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--exec); color: #fff; }
.btn-primary:hover { background: #357ABD; }
.btn-secondary { background: #f1f5f9; color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: #e2e8f0; }
.btn-danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
.btn-danger:hover { background: #fecaca; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ---- Org Chart Container ---- */
.chart-container {
  padding: 32px 24px 64px; overflow-x: auto; min-height: calc(100vh - 60px);
}

/* ---- OWNERSHIP TIER ---- */
.ownership-tier {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-bottom: 32px;
  position: relative;
}
/* Vertical line down from Matt to horizontal connector */
.ownership-tier::after {
  content: '';
  position: absolute;
  bottom: -32px;
  left: calc(50% - 106px);
  width: 2px;
  height: 32px;
  background: #cbd5e1;
  z-index: 1;
}

/* ---- BRANCH CONTAINER ---- */
.branch-container {
  display: flex;
  justify-content: center;
  gap: 80px;
  margin-bottom: 48px;
  margin-top: 0;
  position: relative;
  padding: 0 40px;
  padding-top: 32px;
}

/* Horizontal connector line across all execs at top */
.branch-container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 5%;
  right: 5%;
  height: 2px;
  background: #cbd5e1;
  z-index: 0;
}

/* ---- BRANCH (Executive or Strategic) ---- */
.branch {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 400px;
}

.branch-label {
  display: none;
}

.branch-label.executive {
  background: linear-gradient(135deg, var(--exec), #357ABD);
  color: #fff;
}

.branch-label.strategic {
  background: linear-gradient(135deg, var(--strategic), #6D28D9);
  color: #fff;
}

/* ---- EXECUTIVE ROW ---- */
.exec-row {
  display: flex;
  justify-content: center;
  gap: 48px;
  flex-wrap: nowrap;
  position: relative;
  align-items: flex-start;
}

/* Individual exec with their departments below */
.exec-with-depts {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
}

/* Vertical line UP from each exec to horizontal connector */
.exec-with-depts::before {
  content: '';
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 32px;
  background: #cbd5e1;
  z-index: 0;
}

/* Connector line from exec to their departments */
.exec-connector {
  width: 2px;
  height: 32px;
  background: #cbd5e1;
  margin: 0;
}

/* Container for exec's departments */
.exec-depts {
  display: flex;
  flex-direction: column;
  gap: 24px;
  align-items: center;
}

/* ---- DEPT COLUMNS BELOW EXECS ---- */
.dept-columns {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.dept-column {
  display: flex;
  flex-direction: column;
  gap: 24px;
  align-items: center;
}

/* ---- Department Card ---- */
.dept-card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  width: 320px; overflow: hidden; transition: box-shadow .2s; position: relative;
}
.dept-card:hover { box-shadow: var(--shadow-lg); }
.dept-header {
  padding: 14px 16px; color: #fff; font-weight: 700; font-size: 14px;
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
}
.dept-header .dept-count {
  background: rgba(255,255,255,.25); padding: 2px 8px; border-radius: 10px; font-size: 12px;
}
.dept-header .dept-actions { display: flex; gap: 4px; }
.dept-header .dept-actions button {
  background: rgba(255,255,255,.2); border: none; color: #fff; width: 24px; height: 24px;
  border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
}
.dept-header .dept-actions button:hover { background: rgba(255,255,255,.4); }

.dept-body { padding: 8px; max-height: 600px; overflow-y: auto; }
.dept-body::-webkit-scrollbar { width: 4px; }
.dept-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

/* ---- Department Manager Card ---- */
.dept-manager-section {
  margin: 8px 8px 12px;
  position: relative;
}
.dept-manager-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
  border: 2px solid currentColor;
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.dept-manager-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}
.dept-manager-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.dept-manager-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: #fff;
  flex-shrink: 0;
}
.dept-manager-info {
  flex: 1;
  min-width: 0;
}
.dept-manager-name {
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}
.dept-manager-badge {
  background: currentColor;
  color: #fff;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.dept-manager-title {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dept-manager-placeholder {
  background: rgba(0,0,0,.03);
  border: 2px dashed rgba(0,0,0,.15);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
}
.dept-manager-placeholder:hover {
  background: rgba(0,0,0,.06);
  border-color: rgba(0,0,0,.25);
}
.dept-manager-placeholder-text {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 600;
}

/* ---- Team Connector Lines ---- */
.teams-container {
  position: relative;
  padding-left: 20px;
  margin-top: 16px;
}
.teams-container::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 0;
  bottom: 20px;
  width: 2px;
  background: currentColor;
  opacity: 0.15;
}

/* ---- Team Section ---- */
.team-section {
  margin-bottom: 12px;
  border-radius: 6px;
  overflow: hidden;
  background: rgba(0,0,0,.02);
  position: relative;
}
.team-section::before {
  content: '';
  position: absolute;
  left: -20px;
  top: 20px;
  width: 20px;
  height: 2px;
  background: currentColor;
  opacity: 0.15;
}
.team-header {
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 12px;
  transition: background .15s;
  user-select: none;
}
.team-header:hover { background: rgba(0,0,0,.05); }
.team-header .team-name {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.team-header .team-toggle {
  font-size: 10px;
  transition: transform .2s;
  margin-right: 4px;
}
.team-header.collapsed .team-toggle { transform: rotate(-90deg); }
.team-leader-badge {
  font-size: 11px;
  color: inherit;
  opacity: 0.8;
}
.team-header .team-count {
  background: rgba(0,0,0,.1);
  padding: 2px 6px;
  border-radius: 8px;
  font-size: 11px;
  margin-right: 8px;
}
.team-body {
  padding: 4px;
  max-height: 1000px;
  overflow: hidden;
  transition: max-height .3s ease;
}
.team-body.collapsed {
  max-height: 0;
  padding: 0;
}

/* ---- Add Team Button ---- */
.add-team-btn {
  margin: 8px 8px 4px 28px;
  padding: 8px 12px;
  background: rgba(0,0,0,.04);
  border: 1px dashed rgba(0,0,0,.15);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  color: var(--text-secondary);
}
.add-team-btn:hover {
  background: rgba(0,0,0,.08);
  border-color: rgba(0,0,0,.25);
}

/* ---- Employee Card ---- */
.emp-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
  border: 2px solid transparent;
}
.emp-card:hover { background: #f8fafc; }
.emp-card.dragging { opacity: .4; }
.emp-card.drag-over { border-color: var(--exec); background: #eff6ff; }
.emp-card.search-match { background: #fef9c3; border-color: #facc15; }
.emp-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}
.emp-info {
  flex: 1;
  min-width: 0;
}
.emp-name { 
  font-weight: 600;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 4px;
}
.emp-name .leader-badge { font-size: 12px; }
.emp-title {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Ownership & Executive card variants */
.ownership-card {
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
  padding: 20px 24px;
  text-align: center;
  min-width: 180px;
  cursor: pointer;
  transition: all .2s;
  border: 3px solid var(--ownership-gold);
  position: relative;
}
.ownership-card::before {
  content: '★';
  position: absolute;
  top: 8px;
  right: 8px;
  font-size: 20px;
  color: var(--ownership-gold);
  opacity: 0.6;
}
.ownership-card:hover {
  box-shadow: 0 6px 24px rgba(245, 158, 11, 0.4);
  transform: translateY(-3px);
}
.ownership-card .emp-avatar {
  margin: 0 auto 10px;
  width: 56px;
  height: 56px;
  font-size: 18px;
  background: var(--ownership-gold);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.ownership-card .emp-name {
  font-size: 16px;
  justify-content: center;
  font-weight: 700;
  color: var(--text);
}
.ownership-card .emp-title { 
  font-size: 12px;
  color: #92400E;
  font-weight: 600;
  margin-top: 4px;
}

.exec-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 20px;
  text-align: center;
  min-width: 160px;
  cursor: pointer;
  transition: all .2s;
  border: 2px solid transparent;
}
.exec-card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.exec-card.search-match {
  background: #fef9c3;
  border-color: #facc15;
}
.exec-card .emp-avatar {
  margin: 0 auto 8px;
  width: 48px;
  height: 48px;
  font-size: 16px;
}
.exec-card .emp-name {
  font-size: 15px;
  justify-content: center;
}
.exec-card .emp-title { font-size: 12px; }

/* Branch-specific executive card styling */
.exec-card.executive-branch {
  border-color: var(--exec);
}
.exec-card.strategic-branch {
  border-color: var(--strategic);
}

/* ---- Modal ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  width: 440px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(.95);
  transition: transform .2s;
}
.modal-overlay.active .modal { transform: scale(1); }
.modal-header {
  padding: 20px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h2 { font-size: 18px; }
.modal-close {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--text-secondary);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close:hover { background: #f1f5f9; }
.modal-body { padding: 20px 24px; }
.modal-footer {
  padding: 16px 24px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  border-top: 1px solid var(--border);
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--text-secondary);
}
.form-group input,
.form-group select {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  transition: border .2s;
}
.form-group input:focus,
.form-group select:focus {
  border-color: var(--exec);
}

/* ---- Toast ---- */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: #1e293b;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
  max-width: 360px;
}
.toast.success { border-left: 4px solid #22c55e; }
.toast.error { border-left: 4px solid #ef4444; }
.toast.info { border-left: 4px solid var(--exec); }
@keyframes toastIn {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity:1; }
  to { opacity:0; transform: translateY(-8px); }
}

/* ---- Confirm Dialog ---- */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
}
.confirm-overlay.active {
  opacity: 1;
  pointer-events: all;
}
.confirm-box {
  background: #fff;
  border-radius: 12px;
  padding: 28px;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.confirm-box p {
  font-size: 15px;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* ---- Directory Container ---- */
.directory-container {
  padding: 32px 48px 64px;
  min-height: calc(100vh - 60px);
  max-width: 1400px;
  margin: 0 auto;
}
.directory-header {
  margin-bottom: 24px;
}
.directory-header h2 {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.directory-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
}
.directory-table-wrapper {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.directory-table {
  width: 100%;
  border-collapse: collapse;
}
.directory-table thead {
  background: var(--exec);
  color: #fff;
}
.directory-table th {
  padding: 16px 20px;
  text-align: left;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
  position: relative;
  transition: background .15s;
}
.directory-table th:hover {
  background: #357ABD;
}
.sort-indicator {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  opacity: 0.5;
}
.sort-indicator::after {
  content: '⬍';
}
.sort-indicator.asc::after {
  content: '▲';
  opacity: 1;
}
.sort-indicator.desc::after {
  content: '▼';
  opacity: 1;
}
.directory-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  cursor: pointer;
}
.directory-table tbody tr:hover {
  background: #f8fafc;
}
.directory-table tbody tr:last-child {
  border-bottom: none;
}
.directory-table td {
  padding: 16px 20px;
  font-size: 14px;
}
.directory-table td:first-child {
  font-weight: 600;
  color: var(--text);
}
.directory-table td:nth-child(2) {
  color: var(--text-secondary);
}
.directory-table td:nth-child(3) {
  color: var(--exec);
  font-weight: 600;
}
.directory-table td:nth-child(4),
.directory-table td:nth-child(5) {
  color: var(--text-secondary);
  font-size: 13px;
}
.directory-table td a {
  color: inherit;
  text-decoration: none;
}
.directory-table td a:hover {
  text-decoration: underline;
}

/* ---- Print ---- */
@media print {
  .toolbar, .toast-container, .modal-overlay, .confirm-overlay,
  .dept-header .dept-actions, .add-team-btn { display: none !important; }
  body { background: #fff; }
  .chart-container { padding: 16px; }
  .directory-container { padding: 16px; }
  .dept-card, .exec-card, .ownership-card {
    break-inside: avoid;
    box-shadow: none;
    border: 1px solid #ddd;
  }
  .team-body {
    max-height: none !important;
  }
  .team-body.collapsed {
    max-height: none !important;
    padding: 4px !important;
  }
  .teams-container::before { display: none; }
  .team-section::before { display: none; }
  .ownership-tier::after, .exec-row::before { display: none; }
  
  .directory-table {
    border: 1px solid #ddd;
  }
  .directory-table th {
    background: #4A90E2 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .directory-table tbody tr:hover {
    background: transparent !important;
  }
}
@media (max-width: 1200px) {
  .branch-container {
    gap: 40px;
  }
  .branch {
    min-width: 320px;
  }
}
@media (max-width: 768px) {
  .toolbar { 
    padding: 10px 12px; 
    flex-wrap: wrap;
  }
  .toolbar h1 { 
    width: 100%; 
    margin-bottom: 8px; 
  }
  .tab-buttons {
    margin-left: 0;
    width: 100%;
    margin-bottom: 8px;
  }
  .toolbar input[type="text"] { width: 160px; }
  .branch-container {

<!-- Toolbar -->
<div class="toolbar">
  <h1><span>VICTIG</span> Org Chart <span style="font-size:12px;background:#22c55e;color:white;padding:2px 8px;border-radius:4px;margin-left:8px;">📊 Live</span></h1>
  
  <!-- Tab Buttons -->
  <div class="tab-buttons">
    <button class="tab-btn active" onclick="switchView('chart')">Chart View</button>
    <button class="tab-btn" onclick="switchView('directory')">Directory</button>
  </div>
  
  <input type="text" id="searchInput" placeholder="Search name, title, dept..." oninput="handleSearch(this.value)">
  <button class="btn btn-primary" onclick="syncFromJSON()">🔄 Reload Data</button>
  <button class="btn btn-primary" onclick="openAddEmployee()">+ Employee</button>
  <button class="btn btn-primary" onclick="openAddDept()">+ Department</button>
  <button class="btn btn-secondary" onclick="exportJSON()">Export JSON</button>
  <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Import JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  <button class="btn btn-secondary" onclick="window.print()">Export PDF</button>
</div>

<!-- Chart -->
<div class="chart-container" id="chartContainer"></div>

<!-- Directory -->
<div class="directory-container" id="directoryContainer" style="display:none;">
  <div class="directory-header">
    <h2>Employee Directory</h2>
    <p class="directory-subtitle">Click column headers to sort</p>
  </div>
  <div class="directory-table-wrapper">
    <table class="directory-table" id="directoryTable">
      <thead>
        <tr>
          <th onclick="sortTable('name')">Name <span class="sort-indicator"></span></th>
          <th onclick="sortTable('title')">Title <span class="sort-indicator"></span></th>
          <th onclick="sortTable('department')">Department <span class="sort-indicator"></span></th>
          <th onclick="sortTable('team')">Team <span class="sort-indicator"></span></th>
          <th onclick="sortTable('email')">Email <span class="sort-indicator"></span></th>
          <th onclick="sortTable('phone')">Phone <span class="sort-indicator"></span></th>
        </tr>
      </thead>
      <tbody id="directoryTableBody">
      </tbody>
    </table>
  </div>
</div>

<!-- Employee Modal -->
<div class="modal-overlay" id="empModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="empModalTitle">Edit Employee</h2>
      <button class="modal-close" onclick="closeModal('empModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="empId">
      <div class="form-group"><label>Name</label><input type="text" id="empName"></div>
      <div class="form-group"><label>Initials</label><input type="text" id="empInitials" maxlength="3"></div>
      <div class="form-group"><label>Title</label><input type="text" id="empTitleInput"></div>
      <div class="form-group"><label>Department</label><select id="empDept" onchange="updateTeamSelect()"></select></div>
      <div class="form-group"><label>Team</label><select id="empTeam"><option value="">General</option></select></div>
      <div class="form-group"><label>Reports To</label><select id="empReportsTo"><option value="">None (Top-level)</option></select></div>
      <div class="form-group"><label>Email</label><input type="email" id="empEmail"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="empPhone"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="empDeleteBtn" onclick="deleteEmployee()">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal('empModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployee()">Save</button>
    </div>
  </div>
</div>

<!-- Department Modal -->
<div class="modal-overlay" id="deptModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="deptModalTitle">Edit Department</h2>
      <button class="modal-close" onclick="closeModal('deptModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="deptId">
      <div class="form-group"><label>Department Name</label><input type="text" id="deptName"></div>
      <div class="form-group"><label>Reports To (Executive)</label><select id="deptReportsTo"><option value="">None</option></select></div>
      <div class="form-group"><label>Color</label><input type="color" id="deptColor" value="#4A90E2"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deptDeleteBtn" onclick="deleteDepartment()">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal('deptModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDepartment()">Save</button>
    </div>
  </div>
</div>

<!-- Department Manager Modal -->
<div class="modal-overlay" id="deptManagerModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="deptManagerModalTitle">Assign Department Manager</h2>
      <button class="modal-close" onclick="closeModal('deptManagerModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="deptManagerDeptId">
      <div class="form-group">
        <label>Select Manager/Director</label>
        <select id="deptManagerSelect">
          <option value="">None</option>
        </select>
      </div>
      <p style="font-size:12px;color:var(--text-secondary);margin-top:8px;">
        Department managers oversee all teams in this department.
        They are shown at the top of the department card.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('deptManagerModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveDepartmentManager()">Save</button>
    </div>
  </div>
</div>

<!-- Team Modal -->
<div class="modal-overlay" id="teamModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="teamModalTitle">Add Team</h2>
      <button class="modal-close" onclick="closeModal('teamModal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="teamId">
      <input type="hidden" id="teamDeptId">
      <div class="form-group"><label>Team Name</label><input type="text" id="teamName"></div>
      <div class="form-group"><label>Team Leader</label><select id="teamLeader"><option value="">No leader</option></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="teamDeleteBtn" onclick="deleteTeam()" style="display:none">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal('teamModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTeam()">Save</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg"></p>
    <div style="display:flex;gap:8px;justify-content:center">

    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

// ---- Load / Save ----
let data;

// Deduplicate data arrays by ID (keeps first occurrence)
function deduplicateData(data) {
  if (!data) return;
  
  let originalCounts = {
    employees: data.employees?.length || 0,
    departments: data.departments?.length || 0,
    teams: data.teams?.length || 0
  };
  
  // Deduplicate employees
  if (data.employees) {
    const seen = new Set();
    data.employees = data.employees.filter(emp => {
      if (seen.has(emp.id)) {
        console.warn(`Duplicate employee removed: ${emp.name} (${emp.id})`);
        return false;
      }
      seen.add(emp.id);
      return true;
    });
  }
  
  // Deduplicate departments
  if (data.departments) {
    const seen = new Set();
    data.departments = data.departments.filter(dept => {
      if (seen.has(dept.id)) {
        console.warn(`Duplicate department removed: ${dept.name} (${dept.id})`);
        return false;
      }
      seen.add(dept.id);
      return true;
    });
  }
  
  // Deduplicate teams
  if (data.teams) {
    const seen = new Set();
    data.teams = data.teams.filter(team => {
      if (seen.has(team.id)) {
        console.warn(`Duplicate team removed: ${team.name} (${team.id})`);
        return false;
      }
      seen.add(team.id);
      return true;
    });
  }
  
  // Log deduplication results
  let removed = {
    employees: originalCounts.employees - (data.employees?.length || 0),
    departments: originalCounts.departments - (data.departments?.length || 0),
    teams: originalCounts.teams - (data.teams?.length || 0)
  };
  
  if (removed.employees > 0 || removed.departments > 0 || removed.teams > 0) {
    console.log('🧹 Deduplication removed:', removed);
    toast(`🧹 Removed ${removed.employees} duplicate employees, ${removed.departments} departments, ${removed.teams} teams`, 'info');
  }
}

async function loadFromJSON() {
  try {
    console.log('Loading from data.json...');
    const response = await fetch('data.json?t=' + Date.now(), {
      cache: 'no-cache'
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const jsonData = await response.json();
    console.log('Loaded employees:', jsonData.employees?.length);
    return jsonData;
  } catch(e) {
    console.error('Failed to load data.json:', e);
    return null;
  }
}

async function loadData() {
  toast('Loading org chart...', 'info');
  
  // Try to load from data.json first
  const jsonData = await loadFromJSON();
  if (jsonData) {
    data = jsonData;
  } else {
    // Fallback to localStorage
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      data = JSON.parse(saved);
    } else {
      // Last resort: default data
      data = getDefaultData();
    }
  }
  
  // Ensure data structure is complete
  if (!data.teams) data.teams = [];
  data.departments.forEach(d => {
    if (!('managerId' in d)) d.managerId = null;
  });
  
  migrateToTeams();
  migrateManagers();
  saveData(); // Save to localStorage for offline use
  toast('✅ Loaded', 'success');
}

async function syncFromJSON() {
  toast('Reloading from server...', 'info');
  const jsonData = await loadFromJSON();
  if (jsonData) {
    data = jsonData;
    
    if (!data.teams) data.teams = [];
    data.departments.forEach(d => {
      if (!('managerId' in d)) d.managerId = null;
    });
    migrateToTeams();
    migrateManagers();
    saveData();
    render();
    toast('✅ Reloaded', 'success');
  } else {
    toast('❌ Failed to sync with Google Sheets', 'error');
  }
}

function migrateToTeams() {
  data.departments.forEach(dept => {
    const deptEmps = data.employees.filter(e => e.department === dept.name);
    const deptTeams = data.teams.filter(t => t.departmentId === dept.id);
    
    let generalTeam = deptTeams.find(t => t.name === 'General');
    if (!generalTeam) {
      generalTeam = { id: uid(), name: 'General', departmentId: dept.id, leaderId: null };
      data.teams.push(generalTeam);
    }
    
    deptEmps.forEach(emp => {
      if (!emp.teamId) emp.teamId = generalTeam.id;
      if (typeof emp.sortOrder === 'undefined') emp.sortOrder = 0;
    });
  });
}

function migrateManagers() {
  data.departments.forEach(dept => {
    if (dept.managerId) return;
    if (dept.name === 'Executive') return;
    
    const deptEmps = data.employees.filter(e => e.department === dept.name);
    
    const manager = deptEmps.find(emp => {
      const title = emp.title.toLowerCase();
      return (title.includes('director') || title.includes('manager')) &&
             !title.includes('assistant') &&
             !title.includes('junior');
    });
    
    if (manager) {
      dept.managerId = manager.id;
      delete manager.teamId;
    }
  });
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    console.error('Failed to save to localStorage:', e);
  }
}

function saveDataAndSync() {
  saveData();
}

// ---- Helpers ----
function getDeptColor(deptName) {
  const dept = data.departments.find(d => d.name === deptName);
  return dept ? dept.color : '#94a3b8';
}

function getExecs() {
  return data.employees.filter(e => e.department === 'Executive');
}

function getDeptEmployees(deptName) {
  return data.employees.filter(e => 
    e.department === deptName && e.department !== 'Executive'
  );
}

function getTeamEmployees(teamId) {
  const team = data.teams.find(t => t.id === teamId);
  if (!team) return [];
  
  const dept = data.departments.find(d => d.id === team.departmentId);
  const managerId = dept ? dept.managerId : null;
  
  return data.employees
    .filter(e => e.teamId === teamId)
    .filter(e => !managerId || e.id !== managerId)  // Exclude department manager
    .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
}

function getDeptTeams(deptId) {
  return data.teams.filter(t => t.departmentId === deptId);
}

function getNonExecDepts() {
  return data.departments.filter(d => d.name !== 'Executive');
}

function isMatch(emp) {
  if (!searchQuery) return false;
  const q = searchQuery.toLowerCase();
  return emp.name.toLowerCase().includes(q) ||
         emp.title.toLowerCase().includes(q) ||
         emp.department.toLowerCase().includes(q);
}

function lightenColor(hex, percent) {
  const num = parseInt(hex.replace('#',''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.min(255, (num >> 16) + amt);
  const G = Math.min(255, (num >> 8 & 0x00FF) + amt);
  const B = Math.min(255, (num & 0x0000FF) + amt);
  return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

  const nathan = execs.find(e => e.name === SPECIAL_PEOPLE.NATHAN_CARRIZALES);
  const blake = execs.find(e => e.name === SPECIAL_PEOPLE.BLAKE_VISSER);
  const deb = execs.find(e => e.name === SPECIAL_PEOPLE.DEB_KELLER);

  let html = '';

  // ===== OWNERSHIP TIER (BLUE BOXES, NO STARS) =====
  html += '<div class="ownership-tier">';
  if (matt) html += renderExecCard(matt, '');
  if (brent) html += renderExecCard(brent, '');
  html += '</div>';

  // ===== BRANCH CONTAINER =====
  html += '<div class="branch-container">';
  
  // ----- LEFT BRANCH: Executive Leadership -----
  html += '<div class="branch">';
  html += '<div class="branch-label executive">Executive Leadership</div>';
  
  const executiveLeaders = [ryan, rob, nathan].filter(Boolean);
  
  if (executiveLeaders.length > 0) {
    html += '<div class="exec-row">';
    executiveLeaders.forEach(exec => {
      html += '<div class="exec-with-depts">';
      html += renderExecCard(exec, 'executive-branch');
      
      // Connecting line
      const execDepts = getNonExecDepts().filter(d => d.reportsTo === exec.name);
      if (execDepts.length > 0) {
        html += '<div class="exec-connector"></div>';
        html += '<div class="exec-depts">';
        execDepts.forEach(dept => {
          html += renderDeptCard(dept, 'executive');
        });
        html += '</div>';
      }
      html += '</div>'; // end exec-with-depts
    });
    html += '</div>';
  }
  
  html += '</div>'; // end Executive Leadership branch
  
  // ----- RIGHT BRANCH: Strategic Leadership -----
  html += '<div class="branch">';
  html += '<div class="branch-label strategic">Strategic Leadership</div>';
  
  const strategicLeaders = [blake, deb].filter(Boolean);
  
  if (strategicLeaders.length > 0) {
    html += '<div class="exec-row">';
    strategicLeaders.forEach(exec => {
      html += '<div class="exec-with-depts">';
      html += renderExecCard(exec, 'strategic-branch');
      
      // Connecting line
      const execDepts = getNonExecDepts().filter(d => d.reportsTo === exec.name);
      if (execDepts.length > 0) {
        html += '<div class="exec-connector"></div>';
        html += '<div class="exec-depts">';
        execDepts.forEach(dept => {
          html += renderDeptCard(dept, 'strategic');
        });
        html += '</div>';
      }
      html += '</div>'; // end exec-with-depts
    });
    html += '</div>';
  }
  
  html += '</div>'; // end Strategic Leadership branch
  
  html += '</div>'; // end branch-container
  
  // Show unassigned departments (if any)
  const unassignedDepts = getNonExecDepts().filter(d => !d.reportsTo);
  if (unassignedDepts.length > 0) {
    html += '<div style="margin-top:48px">';
    html += '<div style="text-align:center;font-weight:700;color:var(--text-secondary);margin-bottom:24px">Unassigned Departments</div>';
    html += '<div class="dept-columns">';
    unassignedDepts.forEach(dept => {
      html += '<div class="dept-column">';
      html += renderDeptCard(dept, 'unassigned');
      html += '</div>';
    });
    html += '</div></div>';
  }

  container.innerHTML = html;
}

    <div class="emp-name">${esc(emp.name)}</div>
    <div class="emp-title">${esc(emp.title)}</div>
  </div>`;
}

function renderExecCard(emp, branchClass = '') {
  const matchClass = isMatch(emp) ? ' search-match' : '';
  const color = branchClass === 'strategic-branch' ? 'var(--strategic)' : 'var(--exec)';

  const isBlueOwner = (emp.name === 'Matt Visser' || emp.name === 'Brent Ramey');

  return `<div class="exec-card ${branchClass}${matchClass}" ${borderStyle} onclick="openEditEmployee('${emp.id}')" draggable="true" ondragstart="onDragStart(event,'${emp.id}')">

function renderDeptCard(dept, branchType = 'executive') {
  const allEmps = getDeptEmployees(dept.name);
  const manager = dept.managerId ? data.employees.find(e => e.id === dept.managerId) : null;
  const teams = getDeptTeams(dept.id);
  const color = dept.color;
  
  let html = `<div class="dept-card" data-dept="${esc(dept.name)}" data-dept-id="${dept.id}" style="color:${color}">`;
  html += `<div class="dept-header" style="background:${color}" onclick="openEditDept('${dept.id}')">`;
  html += `<span>${esc(dept.name)} <span class="dept-count">${allEmps.length}</span></span>`;
  html += `<span class="dept-actions">`;
  html += `<button onclick="event.stopPropagation();openAddEmployeeToDept('${esc(dept.name)}','${dept.id}')" title="Add employee">+</button>`;
  html += `</span></div>`;
  
  html += `<div class="dept-body" ondragover="onDragOver(event)" ondrop="onDropDept(event,'${esc(dept.name)}','${dept.id}')">`;
  
  // Department Manager Section - Only show if manager exists
  if (manager) {
    html += `<div class="dept-manager-section" style="color:${color}">`;
    const matchClass = isMatch(manager) ? ' search-match' : '';
    html += `<div class="dept-manager-card${matchClass}" style="border-color:${color}" onclick="openEditEmployee('${manager.id}')">`;
    html += `<div class="dept-manager-header">`;
    html += `<div class="dept-manager-avatar" style="background:${color}">${esc(manager.initials)}</div>`;
    html += `<div class="dept-manager-info">`;
    html += `<div class="dept-manager-name">`;
    html += `${esc(manager.name)}`;
    html += `<span class="dept-manager-badge" style="background:${color}">`;
    html += manager.title.toLowerCase().includes('director') ? 'Director' : 'Manager';
    html += `</span></div>`;
    html += `<div class="dept-manager-title">${esc(manager.title)}</div>`;
    html += `</div></div>`;
    html += `<div style="text-align:center;margin-top:8px;">`;
    html += `<button class="btn btn-sm" onclick="event.stopPropagation();openAssignManager('${dept.id}')" style="font-size:11px;padding:4px 8px;">Change Manager</button>`;
    html += `</div></div>`;
    html += `</div>`;
  }
  
  // Teams Container
  if (teams.length > 0) {
    html += `<div class="teams-container" style="color:${color}">`;
    
    teams.forEach(team => {
      const teamEmps = getTeamEmployees(team.id);
      const isCollapsed = collapseState[team.id] || false;
      const teamColor = lightenColor(color, 35);
      const leader = team.leaderId ? data.employees.find(e => e.id === team.leaderId) : null;
      
      html += `<div class="team-section" data-team-id="${team.id}">`;
      html += `<div class="team-header ${isCollapsed ? 'collapsed' : ''}" style="color:${color};background:${teamColor}" 
                onclick="toggleTeam('${team.id}')" oncontextmenu="openEditTeam('${team.id}');return false;">`;
      html += `<div class="team-name">`;
      html += `<span class="team-toggle">▼</span>`;
      html += `<span>${esc(team.name)}</span>`;
      if (leader) {
        html += `<span class="team-leader-badge">— Leader: ${esc(leader.name)}</span>`;
      }
      html += `<span class="team-count">${teamEmps.length}</span>`;
      html += `</div>`;
      html += `<button class="btn btn-sm" style="padding:2px 6px;font-size:10px;" onclick="event.stopPropagation();openEditTeam('${team.id}')">Edit</button>`;
      html += `</div>`;

        html += renderEmpCard(emp, color, team.leaderId);
      });

        html += '<div style="padding:12px;text-align:center;color:#94a3b8;font-size:11px">No employees</div>';
      }
      html += `</div></div>`;
    });
    
    html += `</div>`;
  }
  
  // Add Team button
  html += `<div class="add-team-btn" onclick="openAddTeam('${dept.id}','${esc(dept.name)}')">+ Add Team</div>`;
  
  html += '</div></div>';
  
  return html;

// ---- Drag and Drop ----
let dragEmpId = null;

function onDragStart(e, empId) {
  dragEmpId = empId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', empId);
  e.target.classList.add('dragging');
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function onDropDept(e, deptName, deptId) {
  e.preventDefault();
  e.stopPropagation();
  if (!dragEmpId) return;
  
  const emp = data.employees.find(em => em.id === dragEmpId);
  if (!emp) return;
  
  let generalTeam = data.teams.find(t => t.departmentId === deptId && t.name === 'General');
  if (!generalTeam) {
    generalTeam = { id: uid(), name: 'General', departmentId: deptId, leaderId: null };
    data.teams.push(generalTeam);
  }
  
  const changed = emp.department !== deptName || emp.teamId !== generalTeam.id;
  emp.department = deptName;
  emp.teamId = generalTeam.id;
  
  if (changed) {
    saveDataAndSync();
    render();
    toast(`Moved ${emp.name} to ${deptName} (General team)`, 'success');
  }
  dragEmpId = null;
}

function onDropTeam(e, teamId, deptName, deptId) {
  // Ignore if dropped on an employee card (let card handler deal with it)
  if (e.target.closest('.emp-card')) return;
  
  e.preventDefault();
  e.stopPropagation();
  if (!dragEmpId) return;
  
  const emp = data.employees.find(em => em.id === dragEmpId);
  if (!emp) return;
  
  const changed = emp.teamId !== teamId || emp.department !== deptName;
  emp.teamId = teamId;
  emp.department = deptName;
  
  if (changed) {
    saveDataAndSync();
    render();
    const team = data.teams.find(t => t.id === teamId);
    toast(`Moved ${emp.name} to ${team.name}`, 'success');
  }
  dragEmpId = null;
}

function onDropCard(e, targetEmpId) {
  e.preventDefault();
  e.stopPropagation();
  
  if (!dragEmpId || dragEmpId === targetEmpId) return;
  
  const dragEmp = data.employees.find(e => e.id === dragEmpId);
  const targetEmp = data.employees.find(e => e.id === targetEmpId);
  
  if (!dragEmp || !targetEmp) return;
  
  // Only allow reordering within same team
  if (dragEmp.teamId !== targetEmp.teamId) {
    toast('Can only reorder within the same team', 'error');
    return;
  }
  
  // Get all employees in this team sorted by sortOrder
  const teamEmps = data.employees
    .filter(e => e.teamId === dragEmp.teamId)
    .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  
  // Find positions
  const dragIdx = teamEmps.findIndex(e => e.id === dragEmpId);
  const targetIdx = teamEmps.findIndex(e => e.id === targetEmpId);
  
  // Remove and reinsert
  const [removed] = teamEmps.splice(dragIdx, 1);
  teamEmps.splice(targetIdx, 0, removed);
  
  // Reassign sortOrder (0, 10, 20, 30...)
  teamEmps.forEach((emp, idx) => {
    emp.sortOrder = idx * 10;
  });
  
  saveDataAndSync();
  render();
  toast(`Reordered ${removed.name}`, 'success');
}

document.addEventListener('dragend', () => {
  dragEmpId = null;
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
});

function populateDeptSelect(selectId, selectedVal) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = '';
  data.departments.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.name;
    opt.textContent = d.name;
    opt.dataset.deptId = d.id;
    if (d.name === selectedVal) opt.selected = true;
    sel.appendChild(opt);
  });
}

function updateTeamSelect() {
  const deptSelect = document.getElementById('empDept');
  const teamSelect = document.getElementById('empTeam');
  const selectedOpt = deptSelect.options[deptSelect.selectedIndex];
  const deptId = selectedOpt ? selectedOpt.dataset.deptId : null;
  
  teamSelect.innerHTML = '';
  
  if (deptId) {
    const teams = getDeptTeams(deptId);
    teams.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      teamSelect.appendChild(opt);
    });
  }
  
  if (teamSelect.options.length === 0) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = 'General';
    teamSelect.appendChild(opt);
  }
}

  deptEmps.forEach(emp => {

function saveDepartmentManager() {
  const deptId = document.getElementById('deptManagerDeptId').value;
  const managerId = document.getElementById('deptManagerSelect').value || null;
  
  const dept = data.departments.find(d => d.id === deptId);
  if (!dept) return;
  
  if (dept.managerId && dept.managerId !== managerId) {
    const oldManager = data.employees.find(e => e.id === dept.managerId);
    if (oldManager) {
      const generalTeam = data.teams.find(t => t.departmentId === deptId && t.name === 'General');
      if (generalTeam) {
        oldManager.teamId = generalTeam.id;
      }
    }
  }
  
  dept.managerId = managerId;
  
  if (managerId) {
    const newManager = data.employees.find(e => e.id === managerId);
    if (newManager) {
      delete newManager.teamId;
    }
  }
  
  saveDataAndSync();
  render();
  closeModal('deptManagerModal');
  toast('Department manager updated', 'success');
}

function saveEmployee() {
  const id = document.getElementById('empId').value;
  const name = document.getElementById('empName').value.trim();
  const initials = document.getElementById('empInitials').value.trim().toUpperCase();
  const title = document.getElementById('empTitleInput').value.trim();
  const dept = document.getElementById('empDept').value;
  const teamId = document.getElementById('empTeam').value || null;
  const reportsTo = document.getElementById('empReportsTo').value || null;
  const email = document.getElementById('empEmail').value.trim();
  const phone = document.getElementById('empPhone').value.trim();

  if (!name) {
    toast('Name is required', 'error');
    return;
  }
  if (!title) {
    toast('Title is required', 'error');
    return;
  }

  const finalInitials = initials || name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  let finalTeamId = teamId;
  if (!finalTeamId && dept !== 'Executive') {
    const deptObj = data.departments.find(d => d.name === dept);
    if (deptObj && deptObj.managerId !== id) {
      let generalTeam = data.teams.find(t => t.departmentId === deptObj.id && t.name === 'General');
      if (!generalTeam) {
        generalTeam = { id: uid(), name: 'General', departmentId: deptObj.id, leaderId: null };
        data.teams.push(generalTeam);
      }
      finalTeamId = generalTeam.id;
    }
  }

  if (id) {
    const emp = data.employees.find(e => e.id === id);
    if (emp) {
      const existingSortOrder = emp.sortOrder || 0;
      Object.assign(emp, {
        name,
        initials: finalInitials,
        title,
        department: dept,
        teamId: finalTeamId,
        reportsTo,
        email,
        phone,
        sortOrder: existingSortOrder
      });
    }
    toast(`Updated ${name}`, 'success');
  } else {
    data.employees.push({
      id: uid(),
      name,
      initials: finalInitials,
      title,
      department: dept,
      teamId: finalTeamId,
      reportsTo,
      email,
      phone
    });
    toast(`Added ${name}`, 'success');
  }
  
  saveDataAndSync();
  render();
  closeModal('empModal');
}

async function deleteEmployee() {
  const id = document.getElementById('empId').value;
  const emp = data.employees.find(e => e.id === id);
  if (!emp) return;
  
  const ok = await confirm2(`Delete ${emp.name}? This cannot be undone.`);
  if (!ok) return;
  
  data.teams.forEach(t => {
    if (t.leaderId === id) t.leaderId = null;
  });
  
  data.departments.forEach(d => {
    if (d.managerId === id) d.managerId = null;
  });
  
  data.employees = data.employees.filter(e => e.id !== id);
  saveDataAndSync();
  render();
  closeModal('empModal');
  toast(`Deleted ${emp.name}`, 'info');
}

function saveDepartment() {
  const id = document.getElementById('deptId').value;
  const name = document.getElementById('deptName').value.trim();
  const reportsTo = document.getElementById('deptReportsTo').value || null;
  const color = document.getElementById('deptColor').value;

  if (!name) {
    toast('Department name is required', 'error');
    return;
  }

  if (id) {
    const dept = data.departments.find(d => d.id === id);
    if (dept) {
      const oldName = dept.name;
      Object.assign(dept, { name, reportsTo, color });
      
      if (oldName !== name) {
        data.employees.filter(e => e.department === oldName).forEach(e => {
          e.department = name;
        });
      }
    }
    toast(`Updated ${name}`, 'success');
  } else {
    if (data.departments.find(d => d.name === name)) {
      toast('Department already exists', 'error');
      return;
    }
    const newDept = { id: uid(), name, reportsTo, managerId: null, color };
    data.departments.push(newDept);
    
    data.teams.push({
      id: uid(),
      name: 'General',
      departmentId: newDept.id,
      leaderId: null
    });
    toast(`Created ${name}`, 'success');
  }
  
  saveDataAndSync();
  render();
  closeModal('deptModal');
}

async function deleteDepartment() {
  const id = document.getElementById('deptId').value;
  const dept = data.departments.find(d => d.id === id);
  if (!dept) return;
  
  const emps = getDeptEmployees(dept.name);
  const msg = emps.length
    ? `Delete "${dept.name}" and its ${emps.length} employee(s)? This cannot be undone.`
    : `Delete "${dept.name}"? This cannot be undone.`;
  
  const ok = await confirm2(msg);
  if (!ok) return;
  
  data.employees = data.employees.filter(e => e.department !== dept.name);
  data.teams = data.teams.filter(t => t.departmentId !== id);
  data.departments = data.departments.filter(d => d.id !== id);
  
  saveDataAndSync();
  render();
  closeModal('deptModal');
  toast(`Deleted ${dept.name}`, 'info');
}

// ---- Team CRUD ----
function openAddTeam(deptId, deptName) {
  document.getElementById('teamModalTitle').textContent = 'Add Team';
  document.getElementById('teamId').value = '';
  document.getElementById('teamDeptId').value = deptId;
  document.getElementById('teamName').value = '';
  
  const dept = data.departments.find(d => d.id === deptId);
  const sel = document.getElementById('teamLeader');
  sel.innerHTML = '<option value="">No leader</option>';
  
  const deptEmps = data.employees.filter(e => 
    e.department === deptName && e.id !== dept.managerId
  );
  
  deptEmps.forEach(emp => {
    const opt = document.createElement('option');
    opt.value = emp.id;
    opt.textContent = `${emp.name} - ${emp.title}`;
    sel.appendChild(opt);
  });
  
  document.getElementById('teamDeleteBtn').style.display = 'none';
  openModal('teamModal');
}

function openEditTeam(teamId) {
  const team = data.teams.find(t => t.id === teamId);
  if (!team) return;
  
  const dept = data.departments.find(d => d.id === team.departmentId);
  if (!dept) return;
  
  document.getElementById('teamModalTitle').textContent = 'Edit Team';
  document.getElementById('teamId').value = team.id;
  document.getElementById('teamDeptId').value = team.departmentId;
  document.getElementById('teamName').value = team.name;
  
  const sel = document.getElementById('teamLeader');
  sel.innerHTML = '<option value="">No leader</option>';
  
  const deptEmps = data.employees.filter(e => 
    e.department === dept.name && e.id !== dept.managerId
  );
  
  deptEmps.forEach(emp => {
    const opt = document.createElement('option');
    opt.value = emp.id;
    opt.textContent = `${emp.name} - ${emp.title}`;
    if (emp.id === team.leaderId) opt.selected = true;
    sel.appendChild(opt);
  });
  
  document.getElementById('teamDeleteBtn').style.display = '';
  openModal('teamModal');
}

function saveTeam() {
  const id = document.getElementById('teamId').value;
  const name = document.getElementById('teamName').value.trim();
  const deptId = document.getElementById('teamDeptId').value;
  const leaderId = document.getElementById('teamLeader').value || null;

  if (!name) {
    toast('Team name is required', 'error');
    return;
  }

  if (id) {
    const team = data.teams.find(t => t.id === id);
    if (team) {
      Object.assign(team, { name, leaderId });
    }
    toast(`Updated ${name}`, 'success');
  } else {
    data.teams.push({
      id: uid(),
      name,
      departmentId: deptId,
      leaderId
    });
    toast(`Created ${name}`, 'success');
  }
  
  saveDataAndSync();
  render();
  closeModal('teamModal');
}

async function deleteTeam() {
  const id = document.getElementById('teamId').value;
  const team = data.teams.find(t => t.id === id);
  if (!team) return;
  
  if (team.name === 'General') {
    toast('Cannot delete the General team', 'error');
    return;
  }
  
  const teamEmps = getTeamEmployees(team.id);
  const msg = teamEmps.length
    ? `Delete "${team.name}"? ${teamEmps.length} employee(s) will be moved to the General team.`
    : `Delete "${team.name}"?`;
  
  const ok = await confirm2(msg);
  if (!ok) return;
  
  let generalTeam = data.teams.find(t => 
    t.departmentId === team.departmentId && t.name === 'General'
  );
  
  if (!generalTeam) {
    generalTeam = {
      id: uid(),
      name: 'General',
      departmentId: team.departmentId,
      leaderId: null
    };
    data.teams.push(generalTeam);
  }
  
  teamEmps.forEach(emp => {
    emp.teamId = generalTeam.id;
  });
  
  data.teams = data.teams.filter(t => t.id !== id);
  saveDataAndSync();
  render();
  closeModal('teamModal');
  toast(`Deleted ${team.name}`, 'info');
}

// ---- Search ----
function handleSearch(q) {
  searchQuery = q;
  render();
  if (q) {
    const count = data.employees.filter(isMatch).length;
    if (count === 0) toast('No results found', 'info');
  }
}

// ---- Import / Export ----
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {
    type: 'application/json'
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'victig-org-chart.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exported JSON', 'success');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.employees || !imported.departments) {
        throw new Error('Invalid format');
      }
      
      if (!imported.teams) imported.teams = [];
      
      imported.departments.forEach(d => {
        if (!('managerId' in d)) d.managerId = null;
      });
      
      data = imported;
      migrateToTeams();
      migrateManagers();
      saveData();
      render();
      toast(`Imported ${data.employees.length} employees`, 'success');
    } catch(err) {
      toast('Invalid JSON file: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ---- Toast ----
function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => {
    if (el.parentNode) el.remove();
  }, 3200);
}

// ---- Confirm Dialog ----
function confirm2(msg) {
  return new Promise(resolve => {
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOverlay').classList.add('active');
    confirmResolveCallback = resolve;
  });
}

function confirmResolve(val) {
  document.getElementById('confirmOverlay').classList.remove('active');
  if (confirmResolveCallback) {
    confirmResolveCallback(val);
    confirmResolveCallback = null;
  }
}

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => 
      m.classList.remove('active')
    );
    document.getElementById('confirmOverlay').classList.remove('active');
    if (confirmResolveCallback) {
      confirmResolveCallback(false);
      confirmResolveCallback = null;
    }
  }
});

// ---- Auto-generate initials from name ----
document.getElementById('empName').addEventListener('input', function() {
  const initials = document.getElementById('empInitials');
  if (!initials.dataset.manual) {
    initials.value = this.value
      .split(' ')
      .filter(Boolean)
      .map(w => w[0])
      .join('')
      .toUpperCase()
      .slice(0, 2);
  }
});

document.getElementById('empInitials').addEventListener('input', function() {
  this.dataset.manual = this.value ? '1' : '';
});

// ---- View Switching ----
let currentView = 'chart';

function switchView(view) {
  currentView = view;
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  if (view === 'chart') {
    document.getElementById('chartContainer').style.display = 'block';
    document.getElementById('directoryContainer').style.display = 'none';
  } else {
    document.getElementById('chartContainer').style.display = 'none';
    document.getElementById('directoryContainer').style.display = 'block';
    renderDirectory();
  }
}

// ---- Directory Table ----
let sortColumn = 'name';
let sortDirection = 'asc';

function renderDirectory() {
  const tbody = document.getElementById('directoryTableBody');
  
  const sorted = [...data.employees].sort((a, b) => {
    let aVal, bVal;
    
    if (sortColumn === 'team') {
      // Special handling for team - need to look up team name
      const aTeam = data.teams.find(t => t.id === a.teamId);
      const bTeam = data.teams.find(t => t.id === b.teamId);
      aVal = aTeam ? aTeam.name : '';
      bVal = bTeam ? bTeam.name : '';
    } else {
      aVal = a[sortColumn] || '';
      bVal = b[sortColumn] || '';
    }
    
    if (typeof aVal === 'string') {
      aVal = aVal.toLowerCase();
      bVal = bVal.toLowerCase();
    }
    
    if (aVal < bVal) return sortDirection === 'asc' ? -1 : 1;
    if (aVal > bVal) return sortDirection === 'asc' ? 1 : -1;
    return 0;
  });
  
  let html = '';
  sorted.forEach(emp => {
    const email = emp.email ? `<a href="mailto:${esc(emp.email)}">${esc(emp.email)}</a>` : '—';
    const phone = emp.phone ? `<a href="tel:${esc(emp.phone)}">${esc(emp.phone)}</a>` : '—';
    const team = emp.teamId ? data.teams.find(t => t.id === emp.teamId) : null;
    const teamName = team ? esc(team.name) : '—';
    
    html += `<tr onclick="openEditEmployee('${emp.id}')">`;
    html += `<td>${esc(emp.name)}</td>`;
    html += `<td>${esc(emp.title)}</td>`;
    html += `<td>${esc(emp.department)}</td>`;
    html += `<td>${teamName}</td>`;
    html += `<td>${email}</td>`;
    html += `<td>${phone}</td>`;
    html += `</tr>`;
  });
  
  tbody.innerHTML = html;
  
  document.querySelectorAll('.sort-indicator').forEach(ind => {
    ind.className = 'sort-indicator';
  });
  
  const activeHeader = document.querySelector(`th[onclick="sortTable('${sortColumn}')"] .sort-indicator`);
  if (activeHeader) {
    activeHeader.classList.add(sortDirection);
  }
}

function sortTable(column) {
  if (sortColumn === column) {
    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
  } else {
    sortColumn = column;
    sortDirection = 'asc';
  }
  renderDirectory();
}

// ---- Init ----
(async function init() {
  await loadData();
  render();
})();
</script>
