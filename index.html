<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VICTIG Org Chart - Live</title>

<!-- Copy all the CSS from the original -->
<style>
/* Will copy full styles from original in next step */
</style>

</head>
<body>

<div class="toolbar">
  <h1><span>VICTIG</span> Org Chart <span class="live-badge">LIVE</span></h1>
  <div class="tab-buttons">
    <button class="tab-btn active" onclick="switchView('chart')">Chart View</button>
    <button class="tab-btn" onclick="switchView('directory')">Directory</button>
  </div>
  <input type="text" id="searchInput" placeholder="Search name, title, dept..." oninput="handleSearch(this.value)">
  <button class="btn btn-primary" onclick="location.reload()">↻ Refresh</button>
  <button class="btn btn-secondary" onclick="window.open('https://docs.google.com/spreadsheets/d/1rVYp2eBuq8v39arij4Hy-mukstagxTgvHfWE-vlHV6E/edit', '_blank')">Edit Sheet</button>
</div>

<div class="chart-container" id="chartContainer">
  <div style="text-align:center;padding:60px 20px;">
    <div style="width:48px;height:48px;border:4px solid #e2e8f0;border-top-color:#4A90E2;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>
    <p style="color:#64748b;">Loading from Google Sheets...</p>
  </div>
</div>

<div class="directory-container" id="directoryContainer" style="display:none;">
  <div class="directory-header">
    <h2>Employee Directory</h2>
    <p class="directory-subtitle">Click column headers to sort</p>
  </div>
  <div class="directory-table-wrapper">
    <table class="directory-table" id="directoryTable">
      <thead>
        <tr>
          <th onclick="sortTable('name')">Name <span class="sort-indicator"></span></th>
          <th onclick="sortTable('title')">Title <span class="sort-indicator"></span></th>
          <th onclick="sortTable('department')">Department <span class="sort-indicator"></span></th>
          <th onclick="sortTable('email')">Email <span class="sort-indicator"></span></th>
          <th onclick="sortTable('phone')">Phone <span class="sort-indicator"></span></th>
        </tr>
      </thead>
      <tbody id="directoryTableBody"></tbody>
    </table>
  </div>
</div>

<div style="position:fixed;bottom:24px;left:24px;background:#fff;padding:12px 20px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;gap:10px;font-size:13px;z-index:500;">
  <div id="syncDot" style="width:8px;height:8px;border-radius:50%;background:#f59e0b;"></div>
  <span id="syncStatus">Loading...</span>
</div>

<style>
@keyframes spin {
  to { transform: rotate(360deg); }
}
.live-badge {
  display:inline-block;background:#10b981;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;margin-left:8px;vertical-align:middle;
}
</style>

<script>
// Google Sheets Configuration
const SHEET_ID = '1rVYp2eBuq8v39arij4Hy-mukstagxTgvHfWE-vlHV6E';
// Make the sheet "Anyone with the link can view" and use this API key approach
// OR make it fully public

let data = { employees: [], departments: [], teams: [] };

// Load from Google Sheets using public API
async function loadData() {
  const syncDot = document.getElementById('syncDot');
  const syncStatus = document.getElementById('syncStatus');
  
  try {
    syncStatus.textContent = 'Loading...';
    
    // For now, load the JSON file you exported
    // We'll switch to Sheets API in production
    const response = await fetch('/Users/kellykapowski/Downloads/victig-org-chart.json');
    data = await response.json();
    
    syncDot.style.background = '#10b981';
    syncStatus.textContent = `Loaded • ${data.employees.length} employees`;
    
    console.log('Data loaded:', data);
    
    // Render would go here
    document.getElementById('chartContainer').innerHTML = '<div style="padding:40px;text-align:center;"><h2>Chart rendering coming next...</h2></div>';
    
  } catch (error) {
    console.error('Error:', error);
    syncDot.style.background = '#ef4444';
    syncStatus.textContent = 'Error loading';
  }
}

loadData();
</script>

</body>
</html>
